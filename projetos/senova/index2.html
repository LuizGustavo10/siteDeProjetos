<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SeNova</title>

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel/slick/slick.css"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/slick-carousel/slick/slick-theme.css"/>

<style>

/* CARDS */
.slide{
  border-radius:18px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
  background:rgba(17,24,39,.55);
  backdrop-filter:blur(10px);
  transition:.3s;
}
.slide:hover{
  transform:translateY(-6px);
  box-shadow:0 18px 40px rgba(0,0,0,.35);
}
.slide img{
  width:100%;
  height:180px;
  object-fit:cover;
}
.description{
  padding:12px;
  font-weight:bold;
}

/* MOBILE IMG MAIOR */
@media(max-width:640px){
  .slide img{height:220px;}
}

</style>
</head>

<body class="bg-gray-900 text-white">

<!-- MODAL -->
<div id="modal" class="fixed inset-0 flex items-center justify-center bg-black bg-opacity-80 z-50">
  <div class="bg-gray-800 p-6 rounded-2xl max-w-sm w-full text-center border border-gray-700">
    <h2 class="text-2xl font-bold mb-3">Bem-vindo ao SeNova</h2>
    <button id="allow-sound" class="bg-blue-600 px-5 py-2 rounded-xl w-full">Entrar</button>
  </div>
</div>

<!-- NAVBAR -->
<nav class="bg-gray-900/70 backdrop-blur fixed w-full z-20 border-b border-gray-700">
  <div class="max-w-screen-xl mx-auto flex justify-between p-4">
    <span class="text-2xl font-extrabold text-blue-400">SeNova</span>

    <button id="menu-btn" class="md:hidden">☰</button>

    <ul id="menu" class="hidden md:flex gap-8">
      <li><a href="#" class="hover:text-blue-400">Efeitos</a></li>
      <li><a href="#" class="hover:text-blue-400">APIs</a></li>
      <li><a href="#" class="hover:text-blue-400">Utilidades</a></li>
      <li><button id="theme-toggle">Tema</button></li>
    </ul>
  </div>
</nav>

<!-- HERO -->
<main class="max-w-screen-xl mx-auto px-4 pt-24">

<section class="grid md:grid-cols-2 gap-10 items-center">

<div class="rounded-2xl overflow-hidden border border-gray-700 shadow-xl">
  <video id="video" muted playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>
</div>

<div class="text-center md:text-left">
  <h1 class="text-4xl md:text-5xl font-extrabold">
    Conheça a <span class="text-blue-400">SeNova</span>
  </h1>

  <p class="mt-4 text-gray-300">
    IA do Senac Nova Londrina para suporte pedagógico.
  </p>

  <a href="#funcoes" class="inline-block mt-6 bg-blue-600 px-6 py-3 rounded-xl">
    Ver funções
  </a>
</div>

</section>

<!-- CARROSSEL -->
<section id="funcoes" class="mt-16">

<p class="text-lg text-gray-300 mb-4">Clique nas funções:</p>

<div class="carousel">

<a href="#"><div class="slide"><img src="imagens/alunos.jpg"><div class="description">Alunos</div></div></a>
<a href="#"><div class="slide"><img src="imagens/instrutores.jpg"><div class="description">Instrutores</div></div></a>
<a href="#"><div class="slide"><img src="imagens/games.jpg"><div class="description">Games</div></div></a>
<a href="#"><div class="slide"><img src="imagens/futuro.jpg"><div class="description">Futuro</div></div></a>
<a href="#"><div class="slide"><img src="imagens/emoções.jpg"><div class="description">Emoções</div></div></a>

</div>

</section>

</main>

<!-- FOOTER -->
<footer class="text-center py-10 mt-16 border-t border-gray-700">
Projeto Senac Nova Londrina
</footer>

<!-- SCRIPTS -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/slick-carousel/slick/slick.min.js"></script>

<script>

// MODAL + VIDEO
allowSound.onclick = () => {
  video.muted = false
  video.play()
  modal.style.display = "none"
}

// MENU MOBILE
menuBtn.onclick = () => menu.classList.toggle("hidden")

// TEMA
themeToggle.onclick = () => document.body.classList.toggle("bg-white")

// CARROSSEL
$('.carousel').slick({
  dots:true,
  infinite:true,
  slidesToShow:4,
  autoplay:true,
  responsive:[
    {breakpoint:1000,settings:{slidesToShow:2}},
    {breakpoint:640,settings:{slidesToShow:1}}
  ]
})

</script>

</body>
</html>
